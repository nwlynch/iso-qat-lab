# ISO-QA-Lab: Main Test Workflow
# ISO/IEC/IEEE 12207:2017 Compliant
# Purpose: Run full test suite with Playwright

name: ISO-QA-Lab - Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly test runs

env:
  MODEL: qwen3.5:9b
  TIMEOUT: 600
  PLAYWRIGHT_BROWSERS: chromium
  QA_LOG_LEVEL: INFO

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install flake8 bandit
          pip install -r requirements.txt || true

      - name: Lint Code
        run: |
          flake8 src/ --count

      - name: Security Scan (Bandit)
        run: |
          bandit -r src/ || true

      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-results
          path: |
            bandit-*.json
            .flake8

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install playwright
          playwright install ${{ env.PLAYWRIGHT_BROWSERS }}

      - name: Install Test Dependencies
        run: |
          pip install -r requirements.txt || true

      - name: Generate Test Cases
        run: |
          ./workflow run-full-lifecycle || true

      - name: Run Tests
        run: |
          playwright test || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            qa-lab/results/
            qa-lab/logs/
          retention-days: 30

      - name: Upload Snapshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-snapshots
          path: qa-lab/results/snapshots/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Security Tools
        run: |
          pip install bandit semgrep trivy

      - name: Bandit Security Scan
        run: |
          bandit -r qa-lab/ -f json -o qa-lab/results/reports/bandit-scan.json || true

      - name: Semgrep Scan
        run: |
          semgrep scan || true

      - name: Trivy Scan
        run: |
          trivy fs qa-lab/ || true

      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: qa-lab/results/reports/
          retention-days: 30

  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: qa-lab/results/

      - name: Analyze Coverage
        run: |
          echo "Coverage analysis placeholder"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: qa-lab/results/
          retention-days: 30

  publish-report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: qa-lab-results/

      - name: Generate Summary Report
        run: |
          cat > qa-lab-results/summary.md << 'EOF'
# ISO-QA-Lab Test Report

**Date:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")

## Test Execution
- Total Tests: TBD
- Passed: TBD
- Failed: TBD

## Security
- Bandit Scan: ${BANDIT_RESULT:-none}
- Semgrep Scan: ${SEMGREP_RESULT:-none}

## Coverage
- Code Coverage: ${COVERAGE:-0}%

## Recommendations
1. Review failed tests
2. Fix security vulnerabilities
3. Improve code coverage
EOF
          cat qa-lab-results/summary.md

      - name: Post to Slack/Channel
        run: |
          echo "Test report published: $(date)"
EOF
